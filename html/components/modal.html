<div id="myModal"
     class="modal fade"
     tabindex="-1"
     aria-hidden="true"
     ng-bs-hide-modal>

  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark border border-warning 
                rounded-4 shadow-lg">

      <!-- Header -->
      <div class="modal-header border-0 justify-content-center">
        <h3 class="fw-bold text-warning m-0">
          Hiba
        </h3>
        <button type="button"
                class="btn-close btn-close-white position-absolute end-0 me-3"
                data-bs-dismiss="modal"
                aria-label="Close">
        </button>
      </div>

      <!-- Body -->
      <div class="modal-body text-center 
                  px-4 px-md-5 py-4">
        <p class="text-white fs-5 mb-0">
          Recept feltöltéshez be kell jelentkezni
        </p>
      </div>

      <!-- Footer -->
      <div class="modal-footer border-0 
                  justify-content-center gap-3 pb-4">
        <button type="button"
                class="btn btn-secondary btn-lg fw-bold"
                ui-sref="login"
                data-bs-dismiss="modal">
          Bejelentkezés
        </button>

        <button type="button"
                class="btn btn-warning btn-lg fw-bold text-dark"
                ui-sref="register"
                data-bs-dismiss="modal">
          Regisztráció
        </button>
      </div>

    </div>
  </div>
</div>
