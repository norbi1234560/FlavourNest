<div class="col-12 col-md-6 col-lg-3 mb-4" ng-repeat="recipe in allRecipes">

  <a ui-sref="recipe({ id: recipe.id })"
     target="_blank"
     class="text-decoration-none text-dark">

    <div class="card h-100">
      <img ng-src="./media/avatar/{{recipe.image}}" 
           alt="{{recipe.title}}" 
           class="card-img-top">

      <div class="card-body">
        <h5 class="card-title">{{recipe.title}}</h5>
        <p class="card-text text-muted">{{recipe.description}}</p>
      </div>
    </div>

  </a>

</div>
