<div class="vh-100">
  <div class="container px-4">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-9 col-md-7 
                  col-lg-6 col-xl-5">

        <!-- Logo -->
        <div class="text-center pt-5 mb-5">
          <h1 class="display-4 fw-bold text-white">
            <span class="text-warning">Flavour</span>
            <span class="text-dark">Nest</span>
          </h1>
        </div>

        <!-- Form wrapper -->
        <div class="bg-dark border border-warning 
                    rounded-3 shadow-lg p-4 p-md-5">
          <form name="registerForm" novalidate>

            <!-- Email -->
            <div class="mb-4">
              <label class="form-label fw-semibold 
                            text-warning fs-5">
                Email cím
              </label>

              <div class="input-group input-group-lg">
                <span class=" input-group-text bg-secondary 
                              text-warning border-warning">
                  <i class="fas fa-envelope"></i>
                </span>

                <input  type="email"
                        class=" form-control bg-secondary 
                                text-white border-warning"
                        placeholder="pelda@konyha.hu"
                        ng-model="user.email"
                        required
                >
              </div>
            </div>

            <!-- Username -->
            <div class="mb-4">
              <label class="form-label fw-semibold text-warning fs-5">
                Felhasználónév
              </label>

              <div class="input-group input-group-lg">
                <span class=" input-group-text bg-secondary 
                              text-warning border-warning">
                  <i class="fas fa-user"></i>
                </span>

                <input  type="text"
                        class=" form-control bg-secondary 
                                text-white border-warning"
                        placeholder="pelda_felhasznalo"
                        ng-model="user.username"
                        required
                >
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label class="form-label fw-semibold text-warning fs-5">
                Jelszó
              </label>

              <div class="input-group input-group-lg">
                <span class=" input-group-text bg-secondary 
                              text-warning border-warning">
                  <i class="fas fa-lock"></i>
                </span>

                <input  type="{{ showPassword ? 'text' : 'password' }}"
                        class="form-control bg-secondary text-white border-warning"
                        placeholder="••••••••"
                        ng-model="user.password"
                        minlength="8"
                        required
                >

                <button type="button"
                        class="btn bg-secondary text-warning border-warning"
                        ng-click="showPassword = !showPassword"
                >
                  <i class="fas {{ showPassword ? 'fa-eye-slash' : 'fa-eye' }}"></i>
                </button>
              </div>
            </div>

            <!-- Password confirm -->
            <div class="mb-4">
              <label class="form-label fw-semibold text-warning fs-5">
                Jelszó újra
              </label>

              <div class="input-group input-group-lg">
                <span class=" input-group-text bg-secondary 
                              text-warning border-warning">
                  <i class="fas fa-lock"></i>
                </span>

                <input  type="password"
                        class=" form-control bg-secondary 
                                text-white border-warning"
                        placeholder="••••••••"
                        ng-model="user.passwordConfirm"
                        minlength="8"
                        required
                >
              </div>
            </div>

            <!-- Register -->
            <button type="button"
                    class=" btn btn-warning btn-lg w-100 
                            fw-bold text-dark shadow-sm"
                    ng-click="registerClick()"
                    ng-disabled=" registerForm.$invalid || 
                                  user.password !== user.passwordConfirm"
            >
              Regisztráció
            </button>

            <hr class="border-secondary my-5">

            <!-- Login link -->
            <div class="text-center">
              <p class="text-white-50 mb-3">
                Már van fiókod?
              </p>

              <a
                ui-sref="login"
                class=" btn btn-outline-warning 
                        rounded-pill px-5 
                        py-3 fw-medium">
                Bejelentkezés
              </a>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>
