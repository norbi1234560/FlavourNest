<div class="vh-100">
  <div class="container px-4">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-9 col-md-7 
                  col-lg-6 col-xl-5">

        <!-- Title -->
        <div class="text-center pt-5 mb-2">
          <h1 class="display-4 fw-bold text-white">
            <span class="text-warning">Flavour</span>
            <span class="text-dark">Nest</span>
          </h1>
        </div>

        <!-- Form -->
        <div class="bg-dark border border-warning 
                    rounded-3 shadow-lg p-4 p-md-5">
          <form name="registerForm" novalidate>

            <!-- Email -->
            <div class="mb-1">
              <label  for="emailInput"
                      class=" form-label fw-semibold 
                              text-warning fs-5">
                Email cím
              </label>

              <div class="input-group input-group-lg">
                <span class=" input-group-text bg-secondary 
                              text-warning border-warning">
                  <i class="fas fa-envelope"></i>
                </span>

                <input  id="emailInput"
                        name="email"
                        type="email"
                        class=" form-control bg-secondary 
                                text-white border-warning"
                        placeholder="pelda@konyha.hu"
                        ng-pattern="/^[^\s@]+@(?:[^\s@]+\.)+[A-Za-z]{2,63}$/"
                        ng-model="user.email"
                        autocomplete="email"
                        required>
              </div>
              <p style="color: red;" ng-class="!emailBool ? 'invisible' : ''">helytelen email formátum</p>
            </div>

            <!-- Username -->
            <div class="mb-1">
              <label  for="usernameInput"
                      class="form-label fw-semibold 
                            text-warning fs-5">
                Felhasználónév
              </label>

              <div class="input-group input-group-lg">
                <span class=" input-group-text bg-secondary 
                              text-warning border-warning">
                  <i class="fas fa-user"></i>
                </span>

                <input  id="usernameInput"
                        name="username"
                        type="text"
                        class=" form-control bg-secondary 
                                text-white border-warning"
                        placeholder="pelda_felhasznalo"
                        ng-model="user.username"
                        autocomplete="name"
                        required>
              </div>
              <p style="color: red;" ng-class="!nameBool ? 'invisible' : ''">helytelen Név formátum</p>
            </div>

            <!-- Password -->
            <div class="mb-1">
              <label  for="passwordInput"
                      class=" form-label fw-semibold 
                              text-warning fs-5">
                Jelszó
              </label>

              <div class="input-group input-group-lg">
                <span class=" input-group-text bg-secondary 
                              text-warning border-warning">
                  <i class="fas fa-lock"></i>
                </span>

                <input  id="passwordInput"
                        name="password"
                        type="{{ showPassword ? 'text' : 'password' }}"
                        class=" form-control bg-secondary 
                                text-white border-warning"
                        placeholder="xxxxxxxx"
                        ng-model="user.password"
                        minlength="8"
                        autocomplete="current-password"
                        required
                        ng-pattern="/^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,20}$/">

                <button type="button"
                        class="btn bg-secondary text-warning border-warning"
                        ng-click="showPassword = !showPassword">
                  <i class="fas {{ showPassword ? 'fa-eye-slash' : 'fa-eye' }}"></i>
                </button>
              </div>
              <p style="color: red;" ng-class="!passwordBool ? 'invisible' : ''">Helytelen! Min 1 nagybetű, 1 szám és 8 karakter!</p> 
            </div>

            <!-- Password confirm -->
            <div class="mb-1">
              <label  for="passwordConfirmInput"
                      class=" form-label fw-semibold 
                              text-warning fs-5">
                Jelszó újra
              </label>

              <div class="input-group input-group-lg">
                <span class=" input-group-text bg-secondary 
                              text-warning border-warning">
                  <i class="fas fa-lock"></i>
                </span>

                <input  id="passwordConfirmInput"
                        type="password"
                        name="passwordConfirm"
                        class=" form-control bg-secondary 
                                text-white border-warning"
                        placeholder="xxxxxxxx"
                        ng-model="user.passwordConfirm"
                        minlength="8"
                        autocomplete="current-password"
                        required
                        ng-keydown="$event.key === 'Enter' && registerClick()">
              </div>
              <p style="color: red;" ng-class="!passwordConfirmBool ? 'invisible' : ''">Nem ugyanaz a két jelszó</p>
            </div>

            <!-- Register -->
            <button type="button"
                    class=" btn btn-warning btn-lg w-100 
                            fw-bold text-dark shadow-sm"
                    ng-click="registerClick()">
              Regisztráció
            </button>

            <hr class="border-secondary my-2">

            <!-- Login link -->
            <div class="text-center">
              <p class="text-white-50 mb-1">
                Már van fiókod?
              </p>

              <a
                ui-sref="login"
                class=" btn btn-outline-warning 
                        rounded-pill px-5 
                        py-1 fw-medium">
                Bejelentkezés
              </a>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>
