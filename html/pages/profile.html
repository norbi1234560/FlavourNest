<div class="min-vh-100 bg-white py-5">
  <div class="container px-4 px-lg-5">

    <!-- Title -->
    <div class="text-center mb-5">
      <h1 class="fw-bold display-4 text-white">
        <span class="text-warning">Flavour</span>
        <span class="text-dark">Nest</span>
      </h1>
    </div>

    <!-- Row -->
    <div class="row justify-content-center">
      <div class="col-12 col-lg-11 col-xl-10 mx-auto">
        <div class="bg-dark border 
                    border-warning rounded-4 
                    shadow-lg p-4 p-md-5">
          
          <!-- Row -->
          <div class="row g-5">

            <!-- Profile picture, buttons -->
            <div class="col-12 col-md-5 col-lg-4 text-center text-md-start">
              <div class="mx-auto mx-md-0 
                            bg-secondary 
                            border border-4 
                            border-warning rounded-circle 
                            d-inline-flex align-items-center 
                            justify-content-center mb-4
                            position-relative avatar-container
                            imgUpload"
                    style="width: 140px; height: 140px; overflow: hidden;"
                    >
                <label  alt="Kép"
                        class="profilePicture"  
                        ng-style="{'background-image': 'url(' + ('data:image/png;base64,'+user.avatar || './media/avatar/basic.jpg') + ')'}"
                        style="display: block; 
                               width: 140px; 
                               height: 140px; 
                               background-size: cover; 
                               background-position: center;"
                        for="imageUpload">

                  <div class="avatar-overlay position-absolute 
                              top-0 start-0 w-100 h-100 
                              d-flex align-items-center 
                              justify-content-center 
                              rounded-circle">
                    <input ng-model="imageUploadModel" 
                           file-input
                           ng-change="imageUpload(imageUploadModel)" 
                           type="file" 
                           class="d-none" 
                           id="imageUpload">
                    <i class="fas fa-upload fa-2x text-white"></i>
                  </div>
                </label>  
              </div>

              <!-- home, delete account buttons -->
              <div class="d-grid gap-3">
                <button class="btn btn-warning 
                                btn-lg fw-bold 
                                text-dark shadow-sm 
                                order-1" 
                        ui-sref="home">
                  Főoldalra
                </button>

                <button class="btn btn-secondary 
                                btn-lg fw-bold 
                                text-dark shadow-sm 
                                order-1" 
                        ui-sref="profilePublic({author_username:user.username})">
                  Publikus profilom
                </button>
                
                <button class="btn btn-danger btn-lg 
                                fw-bold rounded-pill 
                                order-3 order-md-2 
                                mt-3 mt-md-0"
                        ng-click="deleteAccountClick()">
                  Fiók törlése
                </button>
              </div>

            </div>

            <!-- personal info -->
            <div class="col-12 col-md-7 col-lg-8">

              <h4 class="text-warning fw-bold mb-4">Személyes adataim</h4>

              <div class="row g-4 mb-5">
                
                <!-- Username -->
                <div class="col-12 col-md-6">
                  <label  for="usernameInput"
                          class=" text-white-50 small 
                                  text-uppercase fw-semibold">
                    Felhasználónév
                  </label>
                  <input  type="text"
                          id="usernameInput"
                          class="form-control form-control-lg 
                                bg-secondary text-white 
                                border-warning rounded mt-1"
                          value="{{ user.username }}"
                          readonly>
                </div>

                <!-- Email -->
                <div class="col-12 col-md-6">
                  <label  for="emailInput"
                          class=" text-white-50 small 
                                  text-uppercase fw-semibold">
                    Email cím
                  </label>
                  <input  id="emailInput"
                          type="email"
                          class="form-control form-control-lg 
                                bg-secondary text-white 
                                border-warning rounded mt-1"
                          value="{{ user.email }}"
                          readonly>
                </div>

                <!-- registered -->
                <div class="col-12 col-md-6">
                  <label  for="createdatInput"
                          class=" text-white-50 small 
                                  text-uppercase fw-semibold">
                    Csatlakozva
                  </label>
                  <input  id="createdatInput"
                          type="text"
                          class="form-control form-control-lg 
                                bg-secondary text-white 
                                border-warning rounded mt-1"
                          value="{{ user.created_at}}"
                          readonly>
                </div>
              </div>

              <hr class="border-secondary my-5">

              <h5 class="text-warning fw-bold mb-4">Jelszó módosítása</h5>

              <!-- Password change -->
              <div class="row g-4">
                
                <!-- current password-->
                <div class="col-12">
                  <label  class="form-label 
                                text-white-50"
                          for="currentPasswordInput">
                    Jelenlegi jelszó
                  </label>
                  <input  id="currentPasswordInput"
                          type="password"
                          class=" form-control form-control-lg 
                                  bg-secondary text-white 
                                  border-warning rounded"
                          ng-model="currentPassword"
                          ng-pattern="/^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,30}$/">
                </div>
              
                <!-- New password -->
                <div class="col-12 col-md-6">
                  <label  for="newPasswordInput"
                          class=" form-label 
                                  text-white-50">
                    Új jelszó
                  </label>
                  <input  id="newPasswordInput"
                          type="password"
                          class=" form-control form-control-lg 
                                  bg-secondary text-white 
                                  border-warning rounded"
                          ng-model="password"
                          ng-pattern="/^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,30}$/">
                  <small class="text-white-50">Minimum 8 karakter</small>
                </div>
              
                <!-- Confirm password -->
                <div class="col-12 col-md-6">
                  <label  for="confirmPasswordInput"
                          class=" form-label 
                                  text-white-50">
                    Új jelszó újra
                  </label>
                  <input  id="confirmPasswordInput"
                          type="password"
                          class=" form-control form-control-lg 
                                  bg-secondary text-white 
                                  border-warning rounded"
                          ng-model="passwordConfirm">
                </div>


              <!-- Button -->
              <div class="mt-4">
                <button class="btn btn-outline-warning px-5 py-3 fw-bold"
                        ng-click="changePasswordClick()"
                        ng-disabled="!user.password || !password ||
                                     password.length &lt; 8 ||
                                     password !== passwordConfirm||
                                     password  == currentPassword||
                                     currentPassword!==user.password">
                  Jelszó módosítása
                </button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vissza link -->
    <div class="text-center mt-5">
      <a  ui-sref="home" 
          class=" text-warning 
                  text-decoration-none fw-medium">
        ← Vissza a főoldalra
      </a>
    </div>

  </div>
</div>
