<div class="min-vh-100 py-5" style="background-color: #fff8e1;">
  <div class="container px-4 px-lg-5 py-4 bg-white shadow-lg rounded-4">

    <!-- Header Section -->
    <div class="text-center mb-5 pt-3">
      <!-- Category Badge -->
      <div class="mb-4">
        <h1 class="fw-bold display-4 text-dark mb-3">{{recipe.title}}</h1>
        <p class="lead text-muted mb-4">{{recipe.description}}</p>
      </div>

      <!-- Image -->
      <div class="mb-5">
        <div class="ratio ratio-16x9 rounded-4 
                    overflow-hidden shadow">
          <img  ng-src="./media/avatar/{{recipe.image}}" 
                alt="Palacsinta" 
                class="img-fluid object-fit-cover">
        </div>
      </div>

      <!-- Stats -->
      <div class="row justify-content-center g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="card h-100 border-0 bg-light shadow-sm">
            <div class="card-body text-center py-3">
              <div class="text-warning mb-2">
                <i class="bi bi-clock fs-4"></i>
              </div>
              <h5 class="fw-bold mb-1 fs-6">Elkészítési idő</h5>
              <p class="text-muted mb-0">{{recipe.prep_time_minutes}}</p>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card h-100 border-0 bg-light shadow-sm">
            <div class="card-body text-center py-3">
              <div class="text-warning mb-2">
                <i class="bi bi-people fs-4"></i>
              </div>
              <h5 class="fw-bold mb-1 fs-6">Adag</h5>
              <p class="text-muted mb-0">{{recipe.servings}}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tags -->
    <div class="mb-5">
      <h5 class="text-center text-secondary mb-4">
        <i class="bi bi-tags me-2"></i>Kategóriák
      </h5>
      <div class="d-flex flex-wrap justify-content-center gap-2">
        <span ng-repeat="tag in recipe.tags" 
              class=" badge bg-warning bg-opacity-25 
                      text-dark fs-6 py-2 px-3 rounded-pill">
          {{tag}}
        </span>
      </div>
    </div>

    <div class="row g-4">
      <!-- Left Column - Ingredients -->
      <div class="col-lg-4">
        <!-- Ingredients Card -->
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-header bg-warning text-white border-0 rounded-top">
            <div class="d-flex align-items-center">
              <i class="bi bi-basket2-fill fs-4 me-3"></i>
              <h4 class="mb-0 fw-bold">Hozzávalók</h4>
            </div>
          </div>
          <div class="card-body p-0">
            <ul ng-repeat="ingredient in recipe.ingredients" class="list-group list-group-flush">
              <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div>
                  <span class="fw-bold">{{ingredient.name}}</span>
                </div>
                <span class="badge bg-warning bg-opacity-25 text-dark px-3 py-2">{{ingredient.quantity}}{{ingredient.unit}}</span>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Right Column - Steps & Comments -->
      <div class="col-lg-8">
        <!-- Steps Card -->
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-header bg-dark text-white border-0 rounded-top">
            <div class="d-flex align-items-center">
              <i class="bi bi-list-ol fs-4 me-3"></i>
              <h4 class="mb-0 fw-bold">Elkészítés lépésről lépésre</h4>
            </div>
          </div>
          <div  class="card-body p-0">
            <!-- Steps -->
            <div ng-repeat="step in recipe.steps" class="p-4">
              <div class="d-flex">
                <div class="bg-warning text-white rounded-circle 
                            d-flex align-items-center 
                            justify-content-center me-3 flex-shrink-0" style="width: 40px; height: 40px;">
                  <strong>{{step.position}}</strong>
                </div>
                <div>
                  <p class="mb-0">{{step.instruction}}</p>
                </div>
              </div>
            </div>
            
            <hr class="m-0">
          </div>
        </div>
      </div>
