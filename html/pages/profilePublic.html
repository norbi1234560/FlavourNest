<!-- Public Profile Page -->
<div class="bg-light text-dark min-vh-100 py-5">
  <div class="container">

    <!-- Profile Header -->
    <div class="card bg-dark text-light border-0 shadow-lg rounded-4 mb-5">
      <div class="card-body p-4">
        <div class="row align-items-center text-center text-md-start">
          
          <!-- Profile Picture -->
          <div class="col-md-3 mb-4 mb-md-0">
            <img ng-src="{{ userPublicProfile.avatar || './media/avatar/basic.jpg' }}" 
                 alt="Profile Picture"
                 class="img-fluid rounded-circle border border-warning border-3 shadow"
                 style="width:180px; height:180px; object-fit:cover;">
          </div>

          <!-- User Info -->
          <div class="col-md-9">
            <h1 class="text-light opacity-75 mb-2 ">@{{userPublicProfile.username}}</h1>

            <div class="d-flex flex-wrap gap-4 justify-content-center justify-content-md-start small opacity-75 mt-3">
              <span>Tagság kezdete: 📅 {{userPublicProfile.created_at}}</span>
              <span>Receptek száma: 📖 {{userPublicRecipes.length}} recept</span>    
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recipes Section Title -->
    <h3 class="fw-semibold mb-4">
      <span class="text-warning">Feltöltött</span> receptek
    </h3>

    
    <!-- Recipe Cards -->
    <div class="container px-3 px-md-4 py-5">
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xxl-4 g-4">
        <div class="col" ng-repeat="recipe in userPublicRecipes">
          <a ui-sref="recipe({ id: recipe.id})" 
             class="text-decoration-none d-block h-100">
            <div class="card h-100 bg-dark border border-warning border-2 shadow-lg">
              <img  ng-src="{{ recipe.image }}" 
                    alt="{{recipe.title}}" 
                    class="card-img-top recipe-img">
              <div class="card-body d-flex flex-column">
                <h5 class="card-title text-warning fw-bold">{{recipe.title}}</h5>
                <p class="card-text text-white-50 flex-grow-1">{{recipe.description}}</p>
              </div>
            </div>
          </a>
        </div>
      </div>
    </div>
    <div class="text-center mt-5">
      <button type="button"
              class="btn btn-warning fw-bold"
              ng-click="goHomeProfilePublic()">
        Főoldal
      </button>
    </div>
    
  </div>
</div>
