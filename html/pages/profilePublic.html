<!-- Public Profile Page -->
<div class="bg-light text-dark min-vh-100 py-5">
  <div class="container">

    <!-- Profile Header -->
    <div class="card bg-dark text-light border-0 shadow-lg rounded-4 mb-5">
      <div class="card-body p-4">
        <div class="row align-items-center text-center text-md-start">
          
          <!-- Profile Picture -->
          <div class="col-md-3 mb-4 mb-md-0">
            <img ng-src="{{ userPublicProfile.avatar ? './media/avatar/' + userPublicProfile.avatar : './media/avatar/basic.jpg' }}" 
                 alt="Profile Picture"
                 class="img-fluid rounded-circle border border-warning border-3 shadow"
                 style="width:180px; height:180px; object-fit:cover;">
          </div>

          <!-- User Info -->
          <div class="col-md-9">
            <p class="text-light opacity-75 mb-2">@{{userPublicProfile.username}}</p>

            <div class="d-flex flex-wrap gap-4 justify-content-center justify-content-md-start small opacity-75">
              <span>📅 Tag {{userPublicProfile.created_at}} óta</span>
              <span>📖 {{userPublicRecipes.length}} recept</span>    
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Recipes Section Title -->
    <h3 class="fw-semibold mb-4">
      <span class="text-warning">Feltöltött</span> receptek
    </h3>

    <!-- Recipe Cards -->
    <div class="row g-4">

      <div class="col-md-6 col-lg-4" ng-repeat="recipe in user.recipes">
        <div class="card bg-dark text-light border-0 shadow h-100 rounded-4">
          
          <img ng-src="{{recipe.image}}" 
               class="card-img-top rounded-top-4"
               style="height:200px; object-fit:cover;"
               alt="{{recipe.name}}">

          <div class="card-body d-flex flex-column">
            <h5 class="card-title fw-bold text-warning">
              {{recipe.name}}
            </h5>

            <p class="card-text small opacity-75 flex-grow-1">
              {{recipe.shortDescription}}
            </p>

            <div class="small opacity-75 mb-3">
              ⏱ {{recipe.time}} perc  
              <span class="ms-3">⭐ {{recipe.rating}}</span>
            </div>

            <button class="btn btn-warning fw-semibold mt-auto"
                    ng-click="viewRecipe(recipe.id)">
              Megtekintés
            </button>
          </div>

        </div>
      </div>

    </div>

  </div>
</div>
